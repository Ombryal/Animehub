<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniStats | Anime Discovery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--text-dim); font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">EXPLORING ANIME...</p>
    </div>

    <div class="bg-glow"></div>

    <div class="container">
        <header style="margin-bottom: 25px;">
            <h1 style="font-size: 1.8rem; font-weight: 800; letter-spacing: -1px;">Anime</h1>
            <p style="color: var(--accent); font-size: 0.8rem; font-weight: 700; letter-spacing: 1px;">DISCOVER TRENDS</p>
        </header>

        <div class="section-group">
            <div class="row-header">
                <h3>Trending Now</h3>
                <i class="fas fa-fire" style="color: #ff4500;"></i>
            </div>
            <div class="scroller" id="trending-scroll"></div>
        </div>

        <div class="section-group">
            <div class="row-header">
                <h3>Top Rated</h3>
                <i class="fas fa-star" style="color: #ffb800;"></i>
            </div>
            <div class="scroller" id="top-scroll"></div>
        </div>

        <div class="section-group">
            <div class="row-header">
                <h3>Anime Movies</h3>
                <i class="fas fa-film" style="color: var(--accent);"></i>
            </div>
            <div class="scroller" id="movies-scroll"></div>
        </div>

        <div class="section-group" style="margin-top: 10px;">
            <div class="row-header">
                <h3>Popular All-Time</h3>
                <span style="font-size: 0.7rem; color: var(--text-dim);">VIEW ALL</span>
            </div>
            <div id="popular-vertical-list"></div>
        </div>
    </div>

    <nav class="dock">
        <a href="anime.html" class="nav-link active"><div class="pill-btn">ANIME</div></a>
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
        <a href="manga.html" class="nav-link"><i class="fas fa-book-open"></i></a>
    </nav>

    <script src="auth.js"></script>
    <script src="anime.js"></script>
</body>
</html>
