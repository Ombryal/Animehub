<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Details | AniStats</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div></div>
    <div class="bg-glow"></div>

    <div id="det-banner" style="width: 100%; height: 380px; background-size: cover; background-position: center; position: relative; border-bottom: 1px solid var(--glass-border);">
        <div style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, var(--bg-base) 95%);"></div>
        <button onclick="history.back()" class="glass-card" style="position: absolute; top: 20px; left: 20px; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; border: 1px solid var(--glass-border);">
            <i class="fas fa-arrow-left"></i>
        </button>
    </div>

    <div class="container" style="margin-top: -120px; position: relative; z-index: 10; max-width: 900px;">
        
        <div style="display: flex; gap: 25px; align-items: flex-end; margin-bottom: 35px; flex-wrap: wrap;">
            <img id="det-cover" class="glass-card" style="width: 160px; height: 230px; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 2px solid var(--glass-border);">
            <div style="flex: 1; min-width: 280px; padding-bottom: 10px;">
                <h1 id="det-title" style="font-size: 2.2rem; font-weight: 800; line-height: 1.1; letter-spacing: -1px; margin-bottom: 15px;">Loading...</h1>
                <div id="det-meta" style="display: flex; gap: 15px; font-weight: 700; font-size: 0.85rem; color: var(--accent);"></div>
            </div>
        </div>

        <div class="main-col">
            <div class="section-group" style="margin-bottom: 30px;">
                <div class="row-header" style="margin-bottom: 15px;">
                    <h3>Statistics</h3>
                    <i class="fas fa-chart-bar" style="color: var(--accent);"></i>
                </div>
                <div id="det-stats-grid" class="stats-grid-container"></div>
            </div>

            <div class="glass-card" style="padding: 25px; margin-bottom: 30px;">
                <h3 class="section-label">Synopsis</h3>
                <p id="det-desc" style="font-size: 0.95rem; line-height: 1.8; color: var(--text-dim);"></p>
            </div>

            <div class="glass-card" style="padding: 25px; margin-bottom: 30px;">
                <h3 class="section-label">Romaji Title</h3>
                <p id="romaji-title" style="color: white; margin-bottom: 15px; font-weight: 600;"></p>
                <h3 class="section-label">Synonyms</h3>
                <p id="synonyms-list" style="font-size: 0.85rem; color: var(--text-dim);"></p>
            </div>

            <div id="trailer-container" class="section-group"></div>

            <div id="relations-section" class="section-group"></div>

            <div id="characters-section" class="section-group"></div>

            <div class="section-group">
                <div class="row-header"><h3>Recommended</h3></div>
                <div class="scroller" id="recommendations-scroll"></div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="details.js" defer></script>
</body>
</html>
