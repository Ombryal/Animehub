<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Details | AniStats</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div></div>
    <div class="bg-glow"></div>

    <div id="det-banner" style="width: 100%; height: 350px; background-size: cover; background-position: center; position: relative; border-bottom: 1px solid var(--glass-border);">
        <div style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, var(--bg-base));"></div>
        <button onclick="history.back()" class="glass-card" style="position: absolute; top: 20px; left: 20px; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100;">
            <i class="fas fa-arrow-left"></i>
        </button>
    </div>

    <div class="container" style="margin-top: -100px; position: relative; z-index: 10; max-width: 900px;">
        
        <div style="display: flex; gap: 25px; align-items: flex-end; margin-bottom: 40px; flex-wrap: wrap;">
            <img id="det-cover" class="glass-card" style="width: 160px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 2px solid var(--glass-border);">
            <div style="flex: 1; min-width: 280px;">
                <div id="det-genres" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;"></div>
                <h1 id="det-title" style="font-size: 2.2rem; font-weight: 800; line-height: 1.1; letter-spacing: -1px;">Loading...</h1>
                <p id="det-title-sub" style="color: var(--text-dim); font-size: 0.95rem; margin-top: 8px; font-weight: 500;"></p>
            </div>
        </div>

        <div class="details-grid">
            
            <div class="main-col">
                <div class="glass-card" style="padding: 25px; margin-bottom: 30px;">
                    <h3 style="margin-bottom: 15px; font-size: 0.9rem; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase;">Synopsis</h3>
                    <p id="det-desc" style="font-size: 0.95rem; line-height: 1.8; color: var(--text-dim);"></p>
                </div>

                <div id="trailer-section" style="display: none; margin-bottom: 30px;">
                    <h3 style="margin-bottom: 15px; font-size: 1rem; font-weight: 700;">Official Trailer</h3>
                    <div id="trailer-container" class="glass-card" style="overflow: hidden; aspect-ratio: 16/9; width: 100%;">
                        </div>
                </div>

                <div style="margin-bottom: 30px;">
                    <h3 style="margin-bottom: 15px; font-size: 1rem; font-weight: 700;">Main Characters</h3>
                    <div id="det-characters" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px;">
                        </div>
                </div>

                <div style="margin-bottom: 50px;">
                    <h3 style="margin-bottom: 15px; font-size: 1rem; font-weight: 700;">Relations</h3>
                    <div id="det-relations" class="scroller" style="gap: 12px; padding-bottom: 10px;">
                        </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="glass-card" style="padding: 20px; position: sticky; top: 20px;">
                    <h3 style="margin-bottom: 20px; font-size: 0.8rem; color: var(--accent); letter-spacing: 1px; text-transform: uppercase;">Information</h3>
                    
                    <div class="sidebar-stat"><span>Format</span><p id="det-format">-</p></div>
                    <div class="sidebar-stat"><span>Episodes</span><p id="det-episodes">-</p></div>
                    <div class="sidebar-stat"><span>Status</span><p id="det-status">-</p></div>
                    <div class="sidebar-stat"><span>Season</span><p id="det-season">-</p></div>
                    <div class="sidebar-stat"><span>Average Score</span><p id="det-avg-score">-</p></div>
                    <div class="sidebar-stat"><span>Popularity</span><p id="det-popularity">-</p></div>
                    <div class="sidebar-stat"><span>Favorites</span><p id="det-favorites">-</p></div>
                    <div class="sidebar-stat"><span>Studio</span><p id="det-studio">-</p></div>
                    <div class="sidebar-stat"><span>Source</span><p id="det-source">-</p></div>
                </div>
            </div>

        </div>
    </div>

    <script src="auth.js"></script>
    <script src="details.js" defer></script>
</body>
</html>
