<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniStats | Manga Discovery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--text-dim); font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">LOADING MANGA...</p>
    </div>

    <div class="bg-glow"></div>

    <div class="container">
        <header style="margin-bottom: 20px;">
            <h1 style="font-size: 1.8rem; font-weight: 800; letter-spacing: -1px;">Manga</h1>
            <p style="color: var(--accent); font-size: 0.8rem; font-weight: 700; letter-spacing: 1px;">READ THE BEST</p>
        </header>

        <div class="hero-wrapper">
            <div class="hero-carousel" id="hero-carousel"></div>
        </div>

        <div class="section-group">
            <div class="row-header"><h3>Trending Manga</h3><i class="fas fa-book" style="color: #6366f1;"></i></div>
            <div class="scroller" id="trending-manga"></div>
        </div>

        <div class="section-group">
            <div class="row-header"><h3>Trending Manhwa</h3><i class="fas fa-scroll" style="color: #10b981;"></i></div>
            <div class="scroller" id="trending-manhwa"></div>
        </div>

        <div class="section-group">
            <div class="row-header"><h3>Trending Novels</h3><i class="fas fa-pen-nib" style="color: #f59e0b;"></i></div>
            <div class="scroller" id="trending-novel"></div>
        </div>

        <div class="section-group">
            <div class="row-header"><h3>Top Rated</h3><i class="fas fa-star" style="color: #ffb800;"></i></div>
            <div class="scroller" id="top-rated"></div>
        </div>

        <div class="section-group">
            <div class="row-header"><h3>Most Favorite</h3><i class="fas fa-heart" style="color: #ef4444;"></i></div>
            <div class="scroller" id="most-favorite"></div>
        </div>

        <div class="section-group" style="margin-top: 10px;">
            <div class="row-header"><h3>Popular All-Time</h3></div>
            <div id="popular-vertical-list"></div>
        </div>
    </div>

    <nav class="dock">
        <a href="manga.html" class="nav-link active"><div class="pill-btn">MANGA</div></a>
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
        <a href="anime.html" class="nav-link"><i class="fas fa-tv"></i></a>
    </nav>

    <script src="auth.js"></script>
    <script src="manga.js"></script>
</body>
</html>
